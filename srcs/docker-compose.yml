services:
  mariadb:
    build: requirements/mariadb
    image: mariadb
    restart: on-failure
    env_file: .env
    volumes:
      - ${HOME}/data/mariadb:/var/lib/mysql
    networks:
      - inception_network
    secrets:
      - db_password
      - db_root_password

networks:
  inception_network:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
